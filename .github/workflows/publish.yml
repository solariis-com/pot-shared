# TKT-2026-0858 — pot-shared monorepo publish workflow.
#
# Builds + tests + publishes all 5 packages to GitHub Packages on push to main
# whenever package contents change. The `paths` filter prevents documentation-only
# pushes from triggering a publish cycle.

name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@solariis"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish (skip if version unchanged)
        run: |
          set -e
          for dir in packages/*/; do
            pkg_name=$(node -p "require('./${dir}package.json').name")
            pkg_version=$(node -p "require('./${dir}package.json').version")
            echo "Checking ${pkg_name}@${pkg_version}..."
            if npm view "${pkg_name}@${pkg_version}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
              echo "  → already published, skipping"
            else
              echo "  → publishing"
              (cd "${dir}" && pnpm publish --access=public --no-git-checks)
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
